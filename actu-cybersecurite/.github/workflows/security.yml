name: Sécurité - Analyse des vulnérabilités

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Analyse de sécurité hebdomadaire le dimanche à 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: 🔍 Scan Trivy
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Scan des vulnérabilités avec Trivy (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: 🔐 Scan des secrets exposés
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          format: 'table'
          exit-code: '1'

  dependency-check:
    name: 🔒 Vérification des dépendances
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installation pip-audit
        run: pip install pip-audit

      - name: 🔍 Audit des dépendances Python
        run: |
          pip install -r requirements.txt
          pip-audit --strict --desc on

  code-quality:
    name: ✨ Qualité du code
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installation des outils de qualité
        run: |
          pip install flake8 bandit safety

      - name: 🔍 Analyse statique avec Flake8
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

      - name: 🔐 Analyse de sécurité avec Bandit
        run: bandit -r src/ -ll -ii
        continue-on-error: true

      - name: 🛡️ Vérification des vulnérabilités connues
        run: |
          pip install -r requirements.txt
          safety check
        continue-on-error: true
